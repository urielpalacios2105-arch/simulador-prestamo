<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Préstamo</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:"Segoe UI",system-ui;
background:linear-gradient(135deg,#3a7bd5,#00d2ff);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* TARJETA */

.container{
width:100%;
max-width:1100px;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px)}
to{opacity:1; transform:translateY(0)}
}

/* TITULO */

.header{
text-align:center;
margin-bottom:25px;
}

.header h2{
font-size:26px;
color:#333;
margin-bottom:5px;
}

.header p{
color:#777;
font-size:14px;
}

/* FORMULARIO */

.row{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:20px;
}

label{
font-size:13px;
font-weight:600;
color:#555;
display:block;
margin-bottom:5px;
}

input,select{
width:100%;
padding:11px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
transition:.2s;
}

input:focus,select:focus{
outline:none;
border-color:#3a7bd5;
box-shadow:0 0 6px rgba(58,123,213,.3);
}

/* BOTONES */

.buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

button{
padding:11px 20px;
border:none;
border-radius:8px;
font-weight:600;
font-size:14px;
cursor:pointer;
transition:.2s;
}

.calcular{
background:#3a7bd5;
color:white;
}

.calcular:hover{
background:#2c62aa;
transform:translateY(-1px);
}

.limpiar{
background:#ff5a5f;
color:white;
}

.limpiar:hover{
background:#e04347;
transform:translateY(-1px);
}

/* TABLA */

.resultado{
margin-top:25px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:14px;
min-width:600px;
}

th{
background:#3a7bd5;
color:white;
}

th,td{
padding:10px;
text-align:center;
border:1px solid #e6e6e6;
}

tbody tr:nth-child(even){
background:#f7f9fc;
}

tbody tr:hover{
background:#eef4ff;
}

/* RESPONSIVE EXTRA */

@media(max-width:600px){

.container{
padding:20px;
}

.header h2{
font-size:22px;
}

button{
flex:1;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h2>Simulador de Préstamo</h2>
<p>Calcula tus cuotas según monto, plazo y frecuencia de pago</p>
</div>

<div class="row">

<div>
<label>Monto del préstamo</label>
<input type="number" id="monto" placeholder="Ej: 5000">
</div>

<div>
<label>Plazo (meses)</label>
<input type="number" id="plazo" placeholder="Ej: 6">
</div>

<div>
<label>Frecuencia</label>
<select id="frecuencia">
<option value="">Seleccione</option>
<option value="diaria">Diaria</option>
<option value="semanal">Semanal</option>
<option value="quincenal">Quincenal</option>
</select>
</div>

<div>
<label>Tasa mensual (%)</label>
<input type="number" id="tasa" value="23">
</div>

</div>

<div class="buttons">
<button class="calcular" onclick="calcular()">Calcular</button>
<button class="limpiar" onclick="limpiar()">Limpiar</button>
</div>

<div id="resultado" class="resultado"></div>

</div>

<script>

function calcular(){

let prestamo=parseFloat(document.getElementById("monto").value);
let plazoMeses=parseInt(document.getElementById("plazo").value);
let frecuencia=document.getElementById("frecuencia").value;
let tasaMensual=parseFloat(document.getElementById("tasa").value)/100;

if(!prestamo||!plazoMeses||!frecuencia){
alert("Complete todos los campos");
return;
}

let periodosPorMes=0;
let tasaPeriodo=0;

if(frecuencia==="diaria"){
periodosPorMes=30;
tasaPeriodo=tasaMensual/30;
}

if(frecuencia==="semanal"){
periodosPorMes=4;
tasaPeriodo=tasaMensual/4;
}

if(frecuencia==="quincenal"){
periodosPorMes=2;
tasaPeriodo=tasaMensual/2;
}

let n=plazoMeses*periodosPorMes;
let i=tasaPeriodo;

let cuota=prestamo*((i*Math.pow((1+i),n))/(Math.pow((1+i),n)-1));

let saldo=prestamo;

let tabla=`
<table>
<thead>
<tr>
<th>#</th>
<th>Capital</th>
<th>Interés</th>
<th>Cuota</th>
<th>Saldo</th>
</tr>
</thead>
<tbody>
`;

for(let k=1;k<=n;k++){

let interes=saldo*i;
let capital=cuota-interes;

saldo-=capital;

tabla+=`
<tr>
<td>${k}</td>
<td>${capital.toFixed(2)}</td>
<td>${interes.toFixed(2)}</td>
<td>${cuota.toFixed(2)}</td>
<td>${saldo>0?saldo.toFixed(2):"0.00"}</td>
</tr>
`;
}

tabla+="</tbody></table>";

document.getElementById("resultado").innerHTML=tabla;
}

function limpiar(){

document.getElementById("monto").value="";
document.getElementById("plazo").value="";
document.getElementById("frecuencia").value="";
document.getElementById("resultado").innerHTML="";

}

</script>

</body>
</html>
